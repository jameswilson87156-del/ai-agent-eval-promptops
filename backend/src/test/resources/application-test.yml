spring:
  datasource:
    url: jdbc:h2:mem:promptops;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
    username: sa
    password:
    driver-class-name: org.h2.Driver
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
      encoding: UTF-8

promptops:
  demo-data:
    enabled: true
