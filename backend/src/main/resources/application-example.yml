server:
  port: 18080

spring:
  datasource:
    url: ${PROMPTOPS_DB_URL:jdbc:mysql://127.0.0.1:3306/ai_agent_eval_promptops?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false}
    username: ${PROMPTOPS_DB_USER:promptops_user}
    password: ${PROMPTOPS_DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  sql:
    init:
      mode: ${PROMPTOPS_SQL_INIT:always}
      encoding: UTF-8

promptops:
  demo-data:
    enabled: ${PROMPTOPS_DEMO_DATA:true}
